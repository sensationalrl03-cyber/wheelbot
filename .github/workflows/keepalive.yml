# Wakes the Render app when it has spun down (free tier sleeps after ~15 min idle).
# Required once: GitHub repo → Settings → Secrets → Actions → New secret
#   Name:  RENDER_URL
#   Value: https://your-app-name.onrender.com   (no trailing slash)
name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "::warning::RENDER_URL secret is not set. Add it under repo Settings → Secrets → Actions."
            exit 1
          fi
          curl -fsS --retry 2 --retry-delay 10 --max-time 90 "${RENDER_URL%/}/health"
